services:
  ainft-merchant-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ainft-merchant-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NETWORK: mainnet
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/mcp', data=b'{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/list\"}', headers={'content-type':'application/json','accept':'application/json, text/event-stream'}); urllib.request.urlopen(req, timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
